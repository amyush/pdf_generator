<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 920" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a5276"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="920" fill="#f5f7fa" rx="8"/>

  <!-- Title -->
  <text x="640" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">PDF Generation Microservice — Architecture</text>
  <text x="640" y="58" text-anchor="middle" font-size="12" fill="#888">ERP Application | Node.js + Puppeteer + BullMQ + Redis</text>

  <!-- ==================== CLIENT ==================== -->
  <rect x="70" y="85" width="180" height="60" rx="8" fill="#fff" stroke="#6c63ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c63ff">Client / Browser</text>
  <text x="160" y="130" text-anchor="middle" font-size="10" fill="#666">SMB users, unreliable net</text>

  <!-- ==================== EXISTING INFRA GROUP ==================== -->
  <rect x="30" y="175" width="280" height="370" rx="10" fill="none" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="170" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#607d8b">EXISTING INFRASTRUCTURE</text>

  <!-- Django -->
  <rect x="60" y="210" width="220" height="75" rx="8" fill="#fff" stroke="#0d47a1" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">Django Monolith</text>
  <text x="170" y="252" text-anchor="middle" font-size="10" fill="#666">Primary ERP Service</text>
  <text x="170" y="268" text-anchor="middle" font-size="9" fill="#999">EC2 r6i.large (2 vCPU, 16GB)</text>

  <!-- PostgreSQL -->
  <rect x="60" y="310" width="100" height="55" rx="8" fill="#fff" stroke="#1b5e20" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">PostgreSQL</text>
  <text x="110" y="350" text-anchor="middle" font-size="9" fill="#666">RDS r6i.large</text>

  <!-- Redis -->
  <rect x="180" y="310" width="100" height="55" rx="8" fill="#fff" stroke="#b71c1c" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">Redis</text>
  <text x="230" y="350" text-anchor="middle" font-size="9" fill="#666">Cache + Queue</text>

  <!-- Audit hash store label -->
  <rect x="55" y="390" width="230" height="45" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="170" y="408" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Tamper Evidence Store</text>
  <text x="170" y="423" text-anchor="middle" font-size="9" fill="#555">SHA-256 hashes in PostgreSQL</text>

  <!-- Django to PG -->
  <line x1="110" y1="285" x2="110" y2="308" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Django to Redis -->
  <line x1="230" y1="285" x2="230" y2="308" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ==================== PDF MICROSERVICE GROUP ==================== -->
  <rect x="380" y="80" width="540" height="530" rx="10" fill="none" stroke="#1a5276" stroke-width="2"/>
  <rect x="380" y="80" width="540" height="28" rx="10" fill="#1a5276"/>
  <rect x="380" y="95" width="540" height="13" fill="#1a5276"/>
  <text x="650" y="99" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">PDF MICROSERVICE  (EC2 t3.large — 2 vCPU, 8GB — ~$60/mo)</text>

  <!-- API Layer -->
  <rect x="410" y="122" width="480" height="95" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Express API Layer</text>
  <!-- Endpoints -->
  <rect x="425" y="150" width="110" height="28" rx="4" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <text x="480" y="168" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">POST /generate</text>
  <rect x="545" y="150" width="90" height="28" rx="4" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <text x="590" y="168" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">POST /bulk</text>
  <rect x="645" y="150" width="110" height="28" rx="4" fill="#fff" stroke="#e65100" stroke-width="1"/>
  <text x="700" y="168" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">GET /jobs/:id (SSE)</text>
  <rect x="765" y="150" width="110" height="28" rx="4" fill="#fff" stroke="#2e7d32" stroke-width="1"/>
  <text x="820" y="168" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">GET /download/:id</text>
  <text x="650" y="205" text-anchor="middle" font-size="9" fill="#666">JSON payload limit: 50MB | Sync timeout: 5s | Range headers for resumable downloads</text>

  <!-- BullMQ Queue -->
  <rect x="410" y="235" width="220" height="60" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="259" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">BullMQ Job Queue</text>
  <text x="520" y="278" text-anchor="middle" font-size="9" fill="#666">3 retries, exponential backoff, stalled detection</text>

  <!-- Job Store -->
  <rect x="670" y="235" width="220" height="60" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="780" y="259" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Redis Job Store</text>
  <text x="780" y="278" text-anchor="middle" font-size="9" fill="#666">Job metadata, progress, 24h TTL</text>

  <!-- Worker Pool -->
  <rect x="410" y="318" width="480" height="65" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Puppeteer Worker Pool</text>
  <text x="650" y="360" text-anchor="middle" font-size="10" fill="#555">4 concurrent browser tabs | Page acquire/release pattern</text>
  <text x="650" y="375" text-anchor="middle" font-size="9" fill="#888">Auto-recovers broken pages (OOM/crash) with fresh tab</text>

  <!-- Template + PDF Gen -->
  <rect x="410" y="400" width="230" height="60" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="525" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">Template Engine</text>
  <text x="525" y="442" text-anchor="middle" font-size="9" fill="#666">Handlebars (PO + Invoice templates)</text>

  <rect x="660" y="400" width="230" height="60" rx="8" fill="#fce4ec" stroke="#880e4f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="775" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#880e4f">PDF Generator</text>
  <text x="775" y="442" text-anchor="middle" font-size="9" fill="#666">Chunked render (50/page) + pdf-lib merge</text>

  <!-- Hasher -->
  <rect x="410" y="478" width="170" height="45" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="495" y="498" text-anchor="middle" font-size="11" font-weight="bold" fill="#f57f17">SHA-256 Hasher</text>
  <text x="495" y="514" text-anchor="middle" font-size="9" fill="#666">Tamper evidence at gen time</text>

  <!-- Storage -->
  <rect x="610" y="478" width="280" height="45" rx="8" fill="#e0f2f1" stroke="#00695c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="498" text-anchor="middle" font-size="11" font-weight="bold" fill="#00695c">File Storage (Disk / S3)</text>
  <text x="750" y="514" text-anchor="middle" font-size="9" fill="#666">PDFs persisted for download + archival</text>

  <!-- ZIP -->
  <rect x="610" y="540" width="280" height="35" rx="6" fill="#e0f7fa" stroke="#0097a7" stroke-width="1"/>
  <text x="750" y="562" text-anchor="middle" font-size="10" font-weight="bold" fill="#00838f">Archiver (ZIP) for bulk downloads</text>

  <!-- ==================== INTERNAL ARROWS ==================== -->
  <!-- API → Queue -->
  <line x1="520" y1="217" x2="520" y2="233" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- API → Job Store -->
  <line x1="780" y1="217" x2="780" y2="233" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- Queue → Worker -->
  <line x1="520" y1="295" x2="520" y2="316" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Worker → Template -->
  <line x1="525" y1="383" x2="525" y2="398" stroke="#6a1b9a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Worker → PDF Gen -->
  <line x1="775" y1="383" x2="775" y2="398" stroke="#880e4f" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- PDF Gen → Hasher -->
  <path d="M 660 445 L 580 478" stroke="#f57f17" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <!-- PDF Gen → Storage -->
  <line x1="750" y1="460" x2="750" y2="476" stroke="#00695c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Worker ↔ Job Store (progress updates) -->
  <path d="M 780 318 L 780 297" stroke="#e65100" stroke-width="1.2" fill="none" marker-end="url(#arrow-orange)" stroke-dasharray="4,2"/>

  <!-- ==================== EXTERNAL ARROWS ==================== -->
  <!-- Client → Django -->
  <line x1="160" y1="145" x2="160" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="90" y="180" font-size="9" fill="#555">HTTP requests</text>

  <!-- Django → PDF Service API -->
  <path d="M 280 248 L 408 175" stroke="#1a5276" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="310" y="196" font-size="9" font-weight="bold" fill="#1a5276">POST JSON</text>
  <text x="298" y="208" font-size="8" fill="#1a5276">(all data upfront = snapshot)</text>

  <!-- Redis ↔ BullMQ (via external Redis) -->
  <path d="M 280 335 L 408 265" stroke="#c62828" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="320" y="288" font-size="8" fill="#c62828">Queue backed by</text>
  <text x="320" y="298" font-size="8" fill="#c62828">existing Redis</text>

  <!-- Redis ↔ Job Store -->
  <path d="M 280 340 L 668 265" stroke="#e65100" stroke-width="1.2" fill="none" marker-end="url(#arrow-orange)" stroke-dasharray="5,3"/>

  <!-- Client ← Download (response) -->
  <path d="M 160 145 Q 60 400 160 520 Q 300 620 610 510" stroke="#2e7d32" stroke-width="1.5" fill="none" marker-start="url(#arrow-green)" stroke-dasharray="6,3"/>
  <text x="55" y="460" font-size="9" font-weight="bold" fill="#2e7d32">PDF / ZIP download</text>
  <text x="55" y="473" font-size="8" fill="#2e7d32">(Range header support)</text>

  <!-- Client ← SSE -->
  <path d="M 70 120 Q 30 120 30 400 Q 30 650 700 168" stroke="#e65100" stroke-width="1.2" fill="none" stroke-dasharray="4,3"/>
  <text x="18" y="340" font-size="8" font-weight="bold" fill="#e65100" transform="rotate(-90,18,340)">SSE progress stream</text>

  <!-- ==================== DATA FLOW LEGEND ==================== -->
  <rect x="30" y="630" width="580" height="270" rx="10" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="655" font-size="14" font-weight="bold" fill="#1a1a2e">Data Flow</text>

  <!-- Single flow -->
  <rect x="45" y="670" width="12" height="12" rx="2" fill="#1565c0"/>
  <text x="65" y="681" font-size="11" font-weight="bold" fill="#1565c0">Single PDF Request</text>
  <text x="50" y="700" font-size="10" fill="#555">1. Django POSTs JSON payload (all document data) to /api/generate</text>
  <text x="50" y="715" font-size="10" fill="#555">2. Job created in Redis store, queued in BullMQ</text>
  <text x="50" y="730" font-size="10" fill="#555">3. Worker acquires Puppeteer page, renders HTML → PDF</text>
  <text x="50" y="745" font-size="10" fill="#555">4. SHA-256 hash computed, PDF saved to disk</text>
  <text x="50" y="760" font-size="10" fill="#555">5. If done within 5s → sync response with download URL</text>
  <text x="50" y="775" font-size="10" fill="#555">   If timeout → 202 with jobId for async polling</text>

  <!-- Bulk flow -->
  <rect x="45" y="795" width="12" height="12" rx="2" fill="#2e7d32"/>
  <text x="65" y="806" font-size="11" font-weight="bold" fill="#2e7d32">Bulk PDF Request (up to 100 docs)</text>
  <text x="50" y="825" font-size="10" fill="#555">1. Django POSTs array of documents (snapshot of ALL data upfront)</text>
  <text x="50" y="840" font-size="10" fill="#555">2. Bulk job created, N individual jobs queued in BullMQ → 202 response</text>
  <text x="50" y="855" font-size="10" fill="#555">3. Worker processes jobs (4 concurrent). Progress → Redis + SSE stream</text>
  <text x="50" y="870" font-size="10" fill="#555">4. Client polls /jobs/:id/status (JSON) or subscribes (SSE) for real-time updates</text>
  <text x="50" y="885" font-size="10" fill="#555">5. When complete → download individual PDFs or bulk ZIP from /download/bulk/:id</text>

  <!-- ==================== CONSTRAINT CALLOUTS ==================== -->
  <rect x="640" y="630" width="610" height="270" rx="10" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <text x="660" y="655" font-size="14" font-weight="bold" fill="#1a1a2e">Constraint Solutions</text>

  <rect x="655" y="668" width="8" height="8" rx="1" fill="#c62828"/>
  <text x="670" y="676" font-size="10" fill="#333"><tspan font-weight="bold">OOM on 500+ items:</tspan> Chunked rendering (50 items/page) → render each → merge with pdf-lib</text>

  <rect x="655" y="693" width="8" height="8" rx="1" fill="#1565c0"/>
  <text x="670" y="701" font-size="10" fill="#333"><tspan font-weight="bold">Unreliable connectivity:</tspan> PDFs stored server-side, HTTP Range headers for resumable downloads</text>

  <rect x="655" y="718" width="8" height="8" rx="1" fill="#2e7d32"/>
  <text x="670" y="726" font-size="10" fill="#333"><tspan font-weight="bold">Data consistency:</tspan> Django sends ALL data in request body (point-in-time snapshot)</text>

  <rect x="655" y="743" width="8" height="8" rx="1" fill="#e65100"/>
  <text x="670" y="751" font-size="10" fill="#333"><tspan font-weight="bold">Tamper evidence:</tspan> SHA-256 hash computed at generation, stored in PostgreSQL</text>

  <rect x="655" y="768" width="8" height="8" rx="1" fill="#6a1b9a"/>
  <text x="670" y="776" font-size="10" fill="#333"><tspan font-weight="bold">Crash recovery:</tspan> Job state in Redis, BullMQ retries stalled jobs (3 attempts, exp backoff)</text>

  <rect x="655" y="793" width="8" height="8" rx="1" fill="#00695c"/>
  <text x="670" y="801" font-size="10" fill="#333"><tspan font-weight="bold">Budget ~$150/mo:</tspan> t3.large ($60) + existing Redis/RDS + S3 storage (~$1) = ~$61/mo</text>

  <!-- Capacity box -->
  <rect x="655" y="820" width="580" height="70" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="670" y="840" font-size="11" font-weight="bold" fill="#333">Capacity Math</text>
  <text x="670" y="856" font-size="10" fill="#555">Peak: ~1000 req/min = 17 req/sec × 2.5s avg render = 42 concurrent (ideal)</text>
  <text x="670" y="871" font-size="10" fill="#555">Actual: 4 workers × 60s / 2.5s = 96 PDF/min throughput. Queue absorbs burst.</text>
  <text x="670" y="886" font-size="10" fill="#555">Horizontal scaling: add more t3.large workers sharing same Redis queue.</text>

</svg>
